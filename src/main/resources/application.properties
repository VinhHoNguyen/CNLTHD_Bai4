spring.application.name=notification-service
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hdbank.notificationservice.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.hdbank.notificationservice.dto.NotificationEvent

app.kafka.notification-topic=notificationTopic

# Actuator + Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always

# Micrometer tracing + Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
