# Docker Configuration Profile
server.port=8080
spring.application.name=order-service

# Database Configuration - PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://postgres:5432/order_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Eureka Configuration (Docker)
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.hostname=order-service
eureka.instance.prefer-ip-address=true

# Kafka Configuration (Docker)
spring.kafka.bootstrap-servers=kafka:29092

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.inventoryService.register-health-indicator=true
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=5s

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.circuitbreakers.enabled=true

# Tracing Configuration (Docker)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Logging
logging.level.root=INFO
logging.level.com.hdbank.orderservice=DEBUG
